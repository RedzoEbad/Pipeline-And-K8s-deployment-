services:
  mongo:
    image: mongo:6
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - myapp-network
    restart: unless-stopped

  backend:
    build: ./server
    image: backend:v1
    container_name: backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/itemsdb
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - myapp-network
    restart: unless-stopped

  frontend:
    build: ./client
    image: frontend:v1
    container_name: frontend
    environment:
      - REACT_APP_API_URL=http://backend:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - myapp-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  myapp-network:
    driver: bridge